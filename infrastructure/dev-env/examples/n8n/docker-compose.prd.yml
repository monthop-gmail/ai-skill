# Production override
# ใช้: docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d

services:
  n8n:
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # Redis สำหรับ queue mode (prd only)
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
