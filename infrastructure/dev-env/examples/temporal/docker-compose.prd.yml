# Production override
# ใช้: docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d

services:
  temporal:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  worker:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  db:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  temporal-ui:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
