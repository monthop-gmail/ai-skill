# Production override
# ใช้: docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d

services:
  api:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  qdrant:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  ollama:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
