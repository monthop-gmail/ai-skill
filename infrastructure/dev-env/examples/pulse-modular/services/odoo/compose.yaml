# ─── Odoo ERP ───────────────────────────────────────
# ERP หลัก — บัญชี, สต็อก, ขาย, HR

services:
  odoo:
    image: odoo:${ODOO_VERSION:-18}
    environment:
      - HOST=odoo-db
      - PORT=5432
      - USER=${ODOO_DB_USER:-odoo}
      - PASSWORD=${ODOO_DB_PASS:-odoo}
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_addons:/mnt/extra-addons
    depends_on:
      odoo-db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pulse-net
    restart: unless-stopped

  odoo-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=${ODOO_DB_USER:-odoo}
      - POSTGRES_PASSWORD=${ODOO_DB_PASS:-odoo}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pulse-net
    restart: unless-stopped

volumes:
  odoo_data:
  odoo_addons:
  odoo_db_data:
