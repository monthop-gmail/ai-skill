# Production override
# ใช้: docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d

services:
  api:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  worker:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  web:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  db:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  qdrant:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
