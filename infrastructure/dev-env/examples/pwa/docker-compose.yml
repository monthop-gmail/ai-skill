services:
  app:
    build:
      context: .
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
        - VITE_APP_NAME=${VITE_APP_NAME:-My PWA}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
