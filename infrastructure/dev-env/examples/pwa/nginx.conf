server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm image/svg+xml;

    # cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # service worker — ห้าม cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # manifest
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback — ทุก route ชี้ไป index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
