# ─── Shared PostgreSQL ──────────────────────────────
# ใช้ร่วมกัน 3 databases: odoo, keycloak, thingsboard

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - ODOO_DB_USER=${ODOO_DB_USER:-odoo}
      - ODOO_DB_PASSWORD=${ODOO_DB_PASSWORD:-odoo}
      - KEYCLOAK_DB_USER=${KEYCLOAK_DB_USER:-keycloak}
      - KEYCLOAK_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - TB_DB_USER=${TB_DB_USER:-thingsboard}
      - TB_DB_PASSWORD=${TB_DB_PASSWORD:-thingsboard}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./services/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus-net
    restart: unless-stopped

volumes:
  pg_data:
