# =============================================================================
# NEXUS Modular — แยก service เป็นไฟล์ย่อย ใช้ Docker Compose include
# =============================================================================
# ข้อดี: up/down แต่ละ service แยกได้, config ไม่ปนกัน, ดูแลง่ายเมื่อ service เยอะ
# ข้อเสีย: ต้องใช้ Docker Compose v2.20+
# =============================================================================

include:
  - path: ./services/postgres/compose.yaml
  - path: ./services/keycloak/compose.yaml
  - path: ./services/odoo/compose.yaml
  - path: ./services/thingsboard/compose.yaml
  - path: ./services/minio/compose.yaml
  - path: ./services/nas/compose.yaml
  - path: ./services/tunnels/compose.yaml

networks:
  nexus-net:
    driver: bridge
    name: nexus-net
