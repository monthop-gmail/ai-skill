services:

  # ─── Shared PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - ODOO_DB_USER=${ODOO_DB_USER:-odoo}
      - ODOO_DB_PASSWORD=${ODOO_DB_PASSWORD:-odoo}
      - KEYCLOAK_DB_USER=${KEYCLOAK_DB_USER:-keycloak}
      - KEYCLOAK_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - TB_DB_USER=${TB_DB_USER:-thingsboard}
      - TB_DB_PASSWORD=${TB_DB_PASSWORD:-thingsboard}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Keycloak SSO ───────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - JAVA_OPTS_APPEND=-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=50
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  tunnel-keycloak:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_KEYCLOAK}
    depends_on:
      - keycloak
    restart: unless-stopped

  # ─── Odoo ERP ───────────────────────────────────────
  odoo:
    image: odoo:${ODOO_VERSION:-17}
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=${ODOO_DB_USER:-odoo}
      - PASSWORD=${ODOO_DB_PASSWORD:-odoo}
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  tunnel-odoo:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_ODOO}
    depends_on:
      - odoo
    restart: unless-stopped

  # ─── ThingsBoard IoT ───────────────────────────────
  thingsboard:
    image: thingsboard/tb-postgres:latest
    environment:
      - TB_QUEUE_TYPE=in-memory
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/thingsboard
      - SPRING_DATASOURCE_USERNAME=${TB_DB_USER:-thingsboard}
      - SPRING_DATASOURCE_PASSWORD=${TB_DB_PASSWORD:-thingsboard}
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "1883:1883"       # MQTT
      - "5683:5683/udp"   # CoAP
    volumes:
      - tb_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  tunnel-thingsboard:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_TB}
    depends_on:
      - thingsboard
    restart: unless-stopped

  tunnel-mqtt:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_MQTT}
    depends_on:
      - thingsboard
    restart: unless-stopped

  # ─── MinIO Object Storage ──────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  tunnel-minio-api:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_MINIO_API}
    depends_on:
      - minio
    restart: unless-stopped

  tunnel-minio-console:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_MINIO_CONSOLE}
    depends_on:
      - minio
    restart: unless-stopped

  # ─── Samba NAS (LAN only) ──────────────────────────
  samba:
    image: dperson/samba:latest
    environment:
      - TZ=${TZ:-Asia/Bangkok}
    command: >
      -u "${SAMBA_USER:-nasuser};${SAMBA_PASSWORD:-naspass}"
      -s "shared;/shared;yes;no;no;${SAMBA_USER:-nasuser}"
      -s "backup;/backup;yes;no;no;${SAMBA_USER:-nasuser}"
    ports:
      - "445:445"
    volumes:
      - nas_shared:/shared
      - nas_backup:/backup
    restart: unless-stopped

volumes:
  pg_data:
  odoo_data:
  odoo_addons:
  tb_data:
  minio_data:
  nas_shared:
  nas_backup:
