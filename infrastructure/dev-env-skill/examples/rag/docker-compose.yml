services:
  # ─── RAG API ────────────────────────────────────────
  api:
    build: ./api
    environment:
      - NODE_ENV=${ENV:-development}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Qdrant (Vector Database) ───────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Ollama (Local LLM) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ─── Pull models ตอน startup ────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        ollama pull $${EMBEDDING_MODEL:-nomic-embed-text};
        ollama pull $${OLLAMA_MODEL:-llama3.2};
        echo 'Models ready';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      - ollama

  # ─── Tunnels ────────────────────────────────────────
  tunnel-api:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_API}
    depends_on:
      - api
    restart: unless-stopped

  tunnel-qdrant:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_QDRANT}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
