services:
  # ─── Keycloak ───────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26
    command: start --hostname=${KC_HOSTNAME:-auth.dev.example.com} --proxy-headers=xforwarded --http-enabled=true
    environment:
      - KC_DB=postgres
      - KC_DB_URL_HOST=db
      - KC_DB_URL_DATABASE=${DB_NAME:-keycloak}
      - KC_DB_USERNAME=${DB_USER:-keycloak}
      - KC_DB_PASSWORD=${DB_PASS:-keycloak}
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASS:-admin}
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME_STRICT=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PostgreSQL ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-keycloak}
      - POSTGRES_USER=${DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${DB_PASS:-keycloak}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Tunnel ─────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
